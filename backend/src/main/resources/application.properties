spring.application.name=super

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/super}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8080

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.auth.token-secret=${AUTH_TOKEN_SECRET:development-secret-change-me}
app.auth.token-duration-hours=${AUTH_TOKEN_DURATION_HOURS:12}
