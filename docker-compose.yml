services:
  db:
    image: postgres:16-trixie
    container_name: superlaentrada-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-super}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: superlaentrada-backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-super}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-development-secret-change-me}
      AUTH_TOKEN_DURATION_HOURS: ${AUTH_TOKEN_DURATION_HOURS:-12}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend
    container_name: superlaentrada-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  postgres_data:
